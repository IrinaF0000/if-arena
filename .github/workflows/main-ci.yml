name: Main CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: main-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  main-cpp-build:
    name: main-cpp-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure C++
        run: cmake -S . -B build -DBATTLE_BUILD_TESTS=ON
      - name: Build C++
        run: cmake --build build --parallel
      - name: Test C++
        run: ctest --test-dir build --output-on-failure

  main-telegram-mini-app:
    name: main-telegram-mini-app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/telegram_mini_app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  main-docs-and-structure:
    name: main-docs-and-structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate architecture boundaries
        run: python3 scripts/ci/validate_architecture_boundaries.py
      - name: Validate repository structure
        run: bash scripts/ci/validate_structure.sh
      - name: Scan for committed secrets
        run: python3 scripts/ci/scan_secrets.py

  main-packaging-placeholder:
    name: main-packaging-placeholder
    runs-on: ubuntu-latest
    needs: [main-cpp-build, main-docs-and-structure]
    steps:
      - uses: actions/checkout@v4
      - name: Confirm packaging inputs
        run: |
          test -f deploy/docker/Dockerfile.server
          echo "Docker image build is intentionally disabled until the real server binary target and image layout are implemented."
