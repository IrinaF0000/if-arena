<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">IF Arena architecture</title>
  <desc id="desc">Qt and browser clients connect through TCP and WebSocket transports to one authoritative C++ backend and deterministic core.</desc>
  <rect width="960" height="360" rx="22" fill="#0e1624"/>
  <text x="48" y="54" fill="#f3f7fb" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">IF Arena architecture</text>
  <text x="48" y="82" fill="#9fb0c3" font-family="Segoe UI, Arial, sans-serif" font-size="15">One authoritative backend, two user-facing clients</text>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#8fb3ff"/>
    </marker>
  </defs>

  <g font-family="Segoe UI, Arial, sans-serif" filter="url(#shadow)">
    <rect x="56" y="116" width="190" height="72" rx="14" fill="#13283d" stroke="#3f6f9d"/>
    <text x="151" y="147" text-anchor="middle" fill="#f3f7fb" font-size="18" font-weight="700">Qt desktop</text>
    <text x="151" y="169" text-anchor="middle" fill="#aebed0" font-size="13">raw TCP intentions</text>

    <rect x="56" y="216" width="190" height="72" rx="14" fill="#13283d" stroke="#3f6f9d"/>
    <text x="151" y="247" text-anchor="middle" fill="#f3f7fb" font-size="18" font-weight="700">Mini App</text>
    <text x="151" y="269" text-anchor="middle" fill="#aebed0" font-size="13">WebSocket intentions</text>

    <rect x="326" y="116" width="190" height="72" rx="14" fill="#17243b" stroke="#5d78b2"/>
    <text x="421" y="147" text-anchor="middle" fill="#f3f7fb" font-size="18" font-weight="700">TCP transport</text>
    <text x="421" y="169" text-anchor="middle" fill="#aebed0" font-size="13">framing, limits</text>

    <rect x="326" y="216" width="190" height="72" rx="14" fill="#17243b" stroke="#5d78b2"/>
    <text x="421" y="247" text-anchor="middle" fill="#f3f7fb" font-size="18" font-weight="700">WS transport</text>
    <text x="421" y="269" text-anchor="middle" fill="#aebed0" font-size="13">gateway, limits</text>

    <rect x="596" y="146" width="190" height="112" rx="16" fill="#19354b" stroke="#55a3c2"/>
    <text x="691" y="184" text-anchor="middle" fill="#f3f7fb" font-size="19" font-weight="700">battle_backend</text>
    <text x="691" y="209" text-anchor="middle" fill="#aebed0" font-size="13">sessions, ticks, validation</text>
    <text x="691" y="229" text-anchor="middle" fill="#aebed0" font-size="13">score, hazards, rematch</text>

    <rect x="596" y="48" width="190" height="54" rx="14" fill="#222947" stroke="#8567d7"/>
    <text x="691" y="81" text-anchor="middle" fill="#f3f7fb" font-size="17" font-weight="700">battle_protocol</text>

    <rect x="596" y="296" width="190" height="54" rx="14" fill="#193d35" stroke="#5ac19f"/>
    <text x="691" y="329" text-anchor="middle" fill="#f3f7fb" font-size="17" font-weight="700">battle_core</text>

    <text x="840" y="176" fill="#f3f7fb" font-size="16" font-weight="700">Server authority</text>
    <text x="840" y="200" fill="#aebed0" font-size="13">clients send intentions</text>
    <text x="840" y="220" fill="#aebed0" font-size="13">server owns game state</text>
  </g>

  <g fill="none" stroke="#8fb3ff" stroke-width="3" marker-end="url(#arrow)" opacity="0.9">
    <path d="M246 152 H318"/>
    <path d="M246 252 H318"/>
    <path d="M516 152 C548 152 558 176 588 188"/>
    <path d="M516 252 C548 252 558 228 588 216"/>
    <path d="M691 146 V110"/>
    <path d="M691 258 V288"/>
  </g>
</svg>
